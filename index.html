<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore the World</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Hero Section -->
    <div class="hero">
        <img src="https://picsum.photos/1920/540" alt="Background Image">
        <div class="hero-content">
            <h1>Explore the World</h1>
            <button id="cta">Start Exploring</button>
        </div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#destinations">Destinations</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Featured Destinations -->
    <section id="destinations" class="destinations">
        <div class="card">
            <img src="https://picsum.photos/400/300" alt="Paris">
            <h2>Paris</h2>
            <p>Iconic city of love and art.</p>
        </div>
        <div class="card">
            <img src="https://picsum.photos/400/300" alt="Bali">
            <h2>Bali</h2>
            <p>Tropical paradise in Indonesia.</p>
        </div>
        <div class="card">
            <img src="https://picsum.photos/400/300" alt="New York">
            <h2>New York</h2>
            <p>Vibrant city with endless opportunities.</p>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Travelling Website</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
